<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNEFC Pro Scout - Master Lockdown</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --snefc-blue: #004a99; --elite-bg: #e3f2fd; --premier-bg: #e8f5e9; --bubble-bg: #fff3e0; --danger: #dc3545; --bg: #f0f4f8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        .app-container { max-width: 1400px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        
        .mgmt-console { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; border: 1px solid #dee2e6; flex-wrap: wrap; }
        .mgmt-group { display: flex; flex-direction: column; gap: 5px; min-width: 160px; flex: 1; }
        .mgmt-group label { font-size: 10px; font-weight: bold; color: #495057; text-transform: uppercase; }

        /* Multi-Select Filters RESTORED */
        .filter-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 12px; }
        .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; width: 85px; }
        .filter-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid #ddd; background: white; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .filter-btn.active { background: var(--snefc-blue) !important; color: white !important; font-weight: bold; border-color: var(--snefc-blue); }

        /* Table Widths & Sorting Indicators */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1300px; table-layout: fixed; }
        th { background: #f8f9fa; padding: 12px; text-align: left; cursor: pointer; border-bottom: 2px solid #dee2e6; font-size: 11px; position: relative; }
        th.sort-asc::after { content: ' ↑'; color: var(--snefc-blue); }
        th.sort-desc::after { content: ' ↓'; color: var(--snefc-blue); }
        td { padding: 8px 12px; border-bottom: 1px solid #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* FIXED LOCKDOWN WIDTHS */
        .col-num { width: 60px; }
        .col-name { width: 200px; }
        .col-current { width: 160px; }
        .col-field { width: 100px; }
        .col-rate { width: 140px; }
        .col-assign { width: 140px; }
        .col-status { width: 140px; }
        .col-notes { width: auto; }

        /* Row Heatmap */
        tr.rate-E { background-color: var(--elite-bg); }
        tr.rate-P { background-color: var(--premier-bg); }
        tr.rate-B { background-color: var(--bubble-bg); }

        .player-link { color: var(--snefc-blue); font-weight: bold; cursor: pointer; text-decoration: underline; }
        .inline-edit { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 14px; }
        
        /* Modals */
        .modal { display: none; position: fixed; z-index: 10000; inset: 0; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 30px; width: 95%; max-width: 850px; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .span-2 { grid-column: span 2; }
        .span-3 { grid-column: span 3; }
        
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background: var(--snefc-blue); color: white; }
        .btn-outline { border: 1px solid #ddd; background: white; }
        .icon-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; padding: 5px 10px; font-size: 14px; }
        .icon-btn.recording { background: var(--danger); color: white; animation: pulse 1s infinite; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="mgmt-console">
        <div class="mgmt-group"><label>Active Team</label><select id="activeTeamSelect" onchange="updateLocalContext('team', this.value)"></select></div>
        <div class="mgmt-group"><label>Active Season</label><select id="activeSeasonSelect" onchange="updateLocalContext('season', this.value)"></select></div>
        <button class="btn btn-outline" onclick="toggleModal('mgmtModal', true)">Manage Infrastructure</button>
        <button class="btn btn-blue" style="margin-left:auto" onclick="openPlayerModal('')">+ On-Site Add</button>
    </div>

    <div class="filter-section">
        <div class="filter-group">
            <span class="filter-label">Status:</span>
            <button class="filter-btn active" data-filter="status" data-val="all">All</button>
            <button class="filter-btn" data-filter="status" data-val="Evaluated">⚪ Evaluated</button>
            <button class="filter-btn" data-filter="status" data-val="Offered">🟡 Offered</button>
            <button class="filter-btn" data-filter="status" data-val="Committed">🟢 Committed</button>
            <button class="filter-btn" data-filter="status" data-val="Declined">❌ Declined</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Rating:</span>
            <button class="filter-btn active" data-filter="rating" data-val="all">All</button>
            <button class="filter-btn" data-filter="rating" data-val="E">Elite (E)</button>
            <button class="filter-btn" data-filter="rating" data-val="P">Premier (P)</button>
            <button class="filter-btn" data-filter="rating" data-val="C">Competitive (C)</button>
            <button class="filter-btn" data-filter="rating" data-val="B">Bubble (B)</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">Assign Team:</span>
            <button class="filter-btn active" data-filter="team" data-val="all">All</button>
            <button class="filter-btn" data-filter="team" data-val="ECNL">ECNL</button>
            <button class="filter-btn" data-filter="team" data-val="ECNL-RL">ECNL-RL</button>
            <button class="filter-btn" data-filter="team" data-val="Gold">Gold</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="col-num" id="th-number" onclick="handleSort('number')">#</th>
                    <th class="col-name" id="th-firstName" onclick="handleSort('firstName')">Name</th>
                    <th class="col-current" id="th-currentTeam" onclick="handleSort('currentTeam')">Current Team</th>
                    <th class="col-field" id="th-field" onclick="handleSort('field')">Field</th>
                    <th class="col-rate" id="th-rating" onclick="handleSort('rating')">Rating</th>
                    <th class="col-assign" id="th-team" onclick="handleSort('team')">Assign Team</th>
                    <th class="col-status" id="th-status" onclick="handleSort('status')">Status</th>
                    <th class="col-notes">Notes</th>
                </tr>
            </thead>
            <tbody id="playerTableBody"></tbody>
        </table>
    </div>
</div>

<div id="playerModal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="modalTitle" style="margin:0">Player Evaluation Profile</h3>
            <div style="display:flex; gap:8px;">
                <button class="icon-btn" onclick="sendMail(1)">📧 Gratitude</button>
                <button class="icon-btn" onclick="sendMail(2)">📧 Offer</button>
                <button class="icon-btn" onclick="sendMail(3)">📧 Custom</button>
            </div>
        </div>
        <div class="grid">
            <div class="mgmt-group"><label>First Name</label><input type="text" id="fFirst"></div>
            <div class="mgmt-group"><label>Last Name</label><input type="text" id="fLast"></div>
            <div class="mgmt-group"><label>Jersey #</label><input type="text" id="fNum"></div>
            <div class="mgmt-group span-2"><label>Current Club</label><input type="text" id="fCurrentTeam"></div>
            <div class="mgmt-group"><label>Field/Group</label><input type="text" id="fField"></div>
            <div class="mgmt-group"><label>Rating</label><select id="fRating"><option value="">--</option><option value="E">Elite (E)</option><option value="P">Premier (P)</option><option value="C">Competitive (C)</option><option value="D">Developmental (D)</option><option value="B">Bubble (B)</option></select></div>
            <div class="mgmt-group"><label>Assign Team</label><select id="fTeamSelect"><option value="">--</option><option value="ECNL">ECNL</option><option value="ECNL-RL">ECNL-RL</option><option value="Gold">Gold</option></select></div>
            <div class="mgmt-group"><label>Status</label><select id="fStatus"><option value="Evaluated">⚪ Evaluated</option><option value="Offered">🟡 Offered</option><option value="Committed">🟢 Committed</option><option value="Declined">❌ Declined</option></select></div>
            <div class="mgmt-group span-2"><label>Email</label><input type="email" id="fEmail"></div>
            <div class="mgmt-group"><label>Phone</label><input type="tel" id="fPhone"></div>
            <div class="mgmt-group span-3"><label style="color:var(--danger)">Medical Alerts</label><input type="text" id="fMed"></div>
            <div class="mgmt-group span-3"><label style="display:flex; justify-content:space-between;">Notes <button class="icon-btn" id="voiceToggle">🎙️ Dictate</button></label><textarea id="fNotes" rows="5"></textarea></div>
        </div>
        <div style="margin-top:20px; display:flex; justify-content:space-between;">
            <button class="btn btn-outline" style="color:var(--danger)" onclick="deletePlayer()">Delete</button>
            <div style="display:flex; gap:10px;"><button class="btn btn-outline" onclick="toggleModal('playerModal', false)">Cancel</button><button class="btn btn-blue" onclick="savePlayer()">Save Profile</button></div>
        </div>
    </div>
</div>

<div id="mgmtModal" class="modal">
    <div class="modal-content">
        <h3>Manage Infrastructure</h3>
        <div class="grid">
            <div class="mgmt-group"><label>Teams</label><div id="teamList" style="border:1px solid #ccc; height:150px; overflow-y:auto; background:#fff;"></div><div style="display:flex; gap:5px; margin-top:5px;"><input type="text" id="newTeamIn"><button class="btn btn-blue" onclick="addInfra('teams', 'newTeamIn')">Add</button></div></div>
            <div class="mgmt-group"><label>Seasons</label><div id="seasonList" style="border:1px solid #ccc; height:150px; overflow-y:auto; background:#fff;"></div><div style="display:flex; gap:5px; margin-top:5px;"><input type="text" id="newSeasonIn"><button class="btn btn-blue" onclick="addInfra('seasons', 'newSeasonIn')">Add</button></div></div>
        </div>
        <button class="btn btn-outline" style="margin-top:20px;" onclick="toggleModal('mgmtModal', false)">Close</button>
    </div>
</div>

<script>
// --- YOUR CONFIG HERE ---
const firebaseConfig = {
  apiKey: "AIzaSyBQz_2K0tNUfH5-CAxeuxGHiOPI6MEM95k",
  authDomain: "snefc-scout.firebaseapp.com",
  projectId: "snefc-scout",
  storageBucket: "snefc-scout.firebasestorage.app",
  messagingSenderId: "378551140348",
  appId: "1:378551140348:web:b84305dede4bd1a028bc79",
  measurementId: "G-PGQP39G25G"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();

let globalData = { players: {}, teams: {}, seasons: {} };
let localView = { 
    team: localStorage.getItem('snefc_t') || '', season: localStorage.getItem('snefc_s') || '',
    sort: { key: 'firstName', dir: 'asc' },
    filters: { status: new Set(), rating: new Set(), team: new Set() }
};
let editPlayerId = '';
const ratingMap = { 'E': 'Elite (E)', 'P': 'Premier (P)', 'C': 'Competitive (C)', 'D': 'Developmental (D)', 'B': 'Bubble (B)' };

rtdb.ref('/').on('value', (snap) => {
    globalData = snap.val() || { players:{}, teams:{}, seasons:{} };
    if(!localView.team && globalData.teams) localView.team = Object.keys(globalData.teams)[0];
    if(!localView.season && globalData.seasons) localView.season = Object.keys(globalData.seasons)[0];
    render();
});

// --- UPDATED RENDER FUNCTION ---
// Swap this block in your script to enable direct table editing
function render() {
    // 1. Sync Context Dropdowns
    document.getElementById('activeTeamSelect').innerHTML = Object.entries(globalData.teams || {}).map(([id, t]) => 
        `<option value="${id}" ${localView.team===id?'selected':''}>${t.name}</option>`).join('');
    document.getElementById('activeSeasonSelect').innerHTML = Object.entries(globalData.seasons || {}).map(([id, s]) => 
        `<option value="${id}" ${localView.season===id?'selected':''}>${s.name}</option>`).join('');

    // 2. Filter & Sort Logic
    let players = Object.entries(globalData.players || {}).map(([id, p]) => ({ id, ...p }))
        .filter(p => p.contextTeamId === localView.team && p.contextSeasonId === localView.season);

    const visible = players.filter(p => {
        const sMatch = localView.filters.status.size === 0 || localView.filters.status.has(p.status || 'Evaluated');
        const rMatch = localView.filters.rating.size === 0 || localView.filters.rating.has(p.rating);
        const tMatch = localView.filters.team.size === 0 || localView.filters.team.has(p.team);
        return sMatch && rMatch && tMatch;
    });

    visible.sort((a, b) => {
        let vA = (a[localView.sort.key] || "").toString().toLowerCase();
        let vB = (b[localView.sort.key] || "").toString().toLowerCase();
        if (localView.sort.key === 'number') { vA = parseInt(vA) || 0; vB = parseInt(vB) || 0; }
        return localView.sort.dir === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });

    // 3. Table Render with COMBO BOXES
    document.getElementById('playerTableBody').innerHTML = visible.map(p => `
        <tr class="rate-${p.rating}">
            <td class="col-num"><input class="inline-edit" value="${p.number || ''}" onchange="patch('${p.id}', 'number', this.value)"></td>
            <td class="col-name"><span class="player-link" onclick="openPlayerModal('${p.id}')">${p.firstName} ${p.lastName}</span></td>
            <td class="col-current"><input class="inline-edit" value="${p.currentTeam || ''}" onchange="patch('${p.id}', 'currentTeam', this.value)"></td>
            <td class="col-field"><input class="inline-edit" value="${p.field || ''}" onchange="patch('${p.id}', 'field', this.value)"></td>
            
            <td class="col-rate">
                <select class="inline-edit" onchange="patch('${p.id}', 'rating', this.value)">
                    <option value="">--</option>
                    <option value="E" ${p.rating==='E'?'selected':''}>Elite (E)</option>
                    <option value="P" ${p.rating==='P'?'selected':''}>Premier (P)</option>
                    <option value="C" ${p.rating==='C'?'selected':''}>Competitive (C)</option>
                    <option value="B" ${p.rating==='B'?'selected':''}>Bubble (B)</option>
                </select>
            </td>
            
            <td class="col-assign">
                <select class="inline-edit" onchange="patch('${p.id}', 'team', this.value)">
                    <option value="">--</option>
                    <option value="ECNL" ${p.team==='ECNL'?'selected':''}>ECNL</option>
                    <option value="ECNL-RL" ${p.team==='ECNL-RL'?'selected':''}>ECNL-RL</option>
                    <option value="Gold" ${p.team==='Gold'?'selected':''}>Gold</option>
                </select>
            </td>
            
            <td class="col-status">
                <select class="inline-edit" onchange="patch('${p.id}', 'status', this.value)">
                    <option value="Evaluated" ${p.status==='Evaluated'?'selected':''}>⚪ Evaluated</option>
                    <option value="Offered" ${p.status==='Offered'?'selected':''}>🟡 Offered</option>
                    <option value="Committed" ${p.status==='Committed'?'selected':''}>🟢 Committed</option>
                    <option value="Declined" ${p.status==='Declined'?'selected':''}>❌ Declined</option>
                </select>
            </td>
            
            <td class="col-notes"><input class="inline-edit" value="${p.notes || ''}" onchange="patch('${p.id}', 'notes', this.value)"></td>
        </tr>`).join('');
        
    updateSortUI();
}

// LOGIC
function patch(id, f, v) { rtdb.ref(`players/${id}/${f}`).set(v); }
function patchInfra(p, id, v) { rtdb.ref(`${p}/${id}/name`).set(v); }
function delInfra(p, id) { if(confirm("Delete context?")) rtdb.ref(`${p}/${id}`).remove(); }
function handleSort(k) { if(localView.sort.key === k) localView.sort.dir = localView.sort.dir==='asc'?'desc':'asc'; else { localView.sort.key=k; localView.sort.dir='asc'; } render(); }
function updateSortUI() { document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc', 'sort-desc')); const h = document.getElementById('th-'+localView.sort.key); if(h) h.classList.add(localView.sort.dir==='asc'?'sort-asc':'sort-desc'); }
function updateLocalContext(k, v) { localView[k] = v; localStorage.setItem('snefc_'+(k==='team'?'t':'s'), v); render(); }
function toggleModal(m, s) { document.getElementById(m).style.display = s ? 'block' : 'none'; }
function deletePlayer() { if(confirm("Delete player?")) { rtdb.ref('players/'+editPlayerId).remove(); toggleModal('playerModal', false); } }

// Filter Listeners
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
        const g = btn.dataset.filter, v = btn.dataset.val;
        if(v === 'all') localView.filters[g].clear();
        else { if(localView.filters[g].has(v)) localView.filters[g].delete(v); else localView.filters[g].add(v); }
        document.querySelectorAll(`.filter-btn[data-filter="${g}"]`).forEach(b => {
            const bv = b.dataset.val;
            if(bv === 'all') b.classList.toggle('active', localView.filters[g].size===0);
            else b.classList.toggle('active', localView.filters[g].has(bv));
        });
        render();
    };
});

function openPlayerModal(id) {
    editPlayerId = id; const p = id ? globalData.players[id] : {};
    document.getElementById('fFirst').value = p.firstName || '';
    document.getElementById('fLast').value = p.lastName || '';
    document.getElementById('fNum').value = p.number || '';
    document.getElementById('fCurrentTeam').value = p.currentTeam || '';
    document.getElementById('fField').value = p.field || '';
    document.getElementById('fRating').value = p.rating || '';
    document.getElementById('fTeamSelect').value = p.team || '';
    document.getElementById('fStatus').value = p.status || 'Evaluated';
    document.getElementById('fEmail').value = p.email || '';
    document.getElementById('fPhone').value = p.phone || '';
    document.getElementById('fMed').value = p.medical || '';
    document.getElementById('fNotes').value = p.notes || '';
    toggleModal('playerModal', true);
}

function savePlayer() {
    const id = editPlayerId || 'p' + Date.now();
    rtdb.ref('players/' + id).set({
        id, contextTeamId: localView.team, contextSeasonId: localView.season,
        firstName: document.getElementById('fFirst').value, lastName: document.getElementById('fLast').value,
        number: document.getElementById('fNum').value, currentTeam: document.getElementById('fCurrentTeam').value,
        field: document.getElementById('fField').value, rating: document.getElementById('fRating').value,
        team: document.getElementById('fTeamSelect').value, status: document.getElementById('fStatus').value,
        email: document.getElementById('fEmail').value, phone: document.getElementById('fPhone').value,
        medical: document.getElementById('fMed').value, notes: document.getElementById('fNotes').value
    });
    toggleModal('playerModal', false);
}

function sendMail(opt) {
    const fn = document.getElementById('fFirst').value, em = document.getElementById('fEmail').value;
    if(!em) return alert("Email required.");
    let sub = "Tryout Update", body = "";
    if(opt===1) body = `Thanks ${fn} for a great tryout. We'd love to see you back.`;
    else if(opt===2) body = `Congrats ${fn}! We are offering you a spot.`;
    else body = "Hi, [Custom Message]";
    window.location.href = `mailto:${em}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
}

if ('webkitSpeechRecognition' in window) {
    const rec = new webkitSpeechRecognition(); rec.continuous = true;
    document.getElementById('voiceToggle').onclick = function() {
        if(this.classList.contains('recording')) { rec.stop(); this.classList.remove('recording'); }
        else { rec.start(); this.classList.add('recording'); }
    };
    rec.onresult = (e) => { document.getElementById('fNotes').value += " " + e.results[e.results.length-1][0].transcript; };
}
</script>
</body>
</html>
